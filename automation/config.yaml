# Claude automation configuration
model: claude-3-5-sonnet-20241022
max_tokens: 4500
temperature: 0.6

paths:
  transcripts: ./transcripts
  outputs: ./output
  archive: ./output/archive
  prompts:
    brainstorm: ./system_prompts/phase1_brainstorming.md
    formatted_transcript: ./system_prompts/phase4_transcript.md
    timestamps: ./system_prompts/phase4_timestamps.md
    revision: ./system_prompts/phase2_editing.md
    keyword_report: ./system_prompts/phase3_analysis.md
    implementation: ./system_prompts/phase3_implementation.md

patterns:
  transcript: "*_ForClaude.txt"
  draft: "*"
  semrush: "*"  # Image format detection handled in code (supports .png, .jpg, .jpeg case-insensitive)

watcher:
  debounce_seconds: 2
  retry_attempts: 3
  retry_backoff_seconds: 10

archive:
  days_to_keep: 90
  include_transcripts: true
  include_outputs: true
